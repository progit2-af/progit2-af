name: Release on push to main

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.1
        bundler-cache: true # runs 'bundle install' and caches installed gems automatically

    - name: Build release assets
      run: bundle exec rake book:build

    - name: Compute tag name
      id: compute-tag
      run: |
        echo "Computing next tag number"
        LASTTAG=$(git tag --list '2.1.*' --sort=-v:refname | head -n 1)
        if [ -z "$LASTTAG" ]; then
          PATCH=0
        else
          LASTPATCH=$(echo "$LASTTAG" | cut -d. -f3)
          PATCH=$((LASTPATCH + 1))
        fi
        echo "tagname=2.1.${PATCH}" >> "$GITHUB_OUTPUT"

    - name: Create release
      uses: ncipollo/release-action@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ steps.compute-tag.outputs.tagname }}
        commit: main
        artifacts: './progit.epub,./progit.fb2.zip,./progit.mobi,./progit.pdf,./progit.html'